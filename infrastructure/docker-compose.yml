version: "3.8"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: medlab_postgres
    environment:
      POSTGRES_DB: medlab_db
      POSTGRES_USER: medlab_user
      POSTGRES_PASSWORD: medlab_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - medlab_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medlab_user -d medlab_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Java 后端应用
  backend:
    build:
      context: ../backend-java
      dockerfile: Dockerfile
    container_name: medlab_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/medlab_db
      SPRING_DATASOURCE_USERNAME: medlab_user
      SPRING_DATASOURCE_PASSWORD: medlab_password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - medlab_network
    volumes:
      - ./uploads:/app/uploads

  # Python OCR 微服务
  ocr_service:
    build:
      context: ./ai-services-python/ocr_service
      dockerfile: Dockerfile
    container_name: medlab_ocr
    ports:
      - "8000:8000"
    networks:
      - medlab_network
    environment:
      - PYTHONUNBUFFERED=1

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: medlab_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend-vue/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - ocr_service
    networks:
      - medlab_network

  # Redis 缓存（可选）
  redis:
    image: redis:7-alpine
    container_name: medlab_redis
    ports:
      - "6379:6379"
    networks:
      - medlab_network
    volumes:
      - redis_data:/data

  # Ollama AI 模型服务（可选）
  ollama:
    image: ollama/ollama:latest
    container_name: medlab_ollama
    ports:
      - "11434:11434"
    networks:
      - medlab_network
    volumes:
      - ollama_data:/root/.ollama

networks:
  medlab_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ollama_data:
