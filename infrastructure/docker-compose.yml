services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:15-alpine}
    container_name: medlab-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: medlab_db
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-medlab_user}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-medlab_password}
      TZ: Asia/Shanghai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - medlab-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  java-backend:
    build:
      context: ../backend-java
      dockerfile: Dockerfile
      args:
        MAVEN_BASE_IMAGE: ${MAVEN_BASE_IMAGE:-m.daocloud.io/docker.io/library/maven:3.9-eclipse-temurin-17}
        JAVA_RUNTIME_IMAGE: ${JAVA_RUNTIME_IMAGE:-m.daocloud.io/docker.io/library/eclipse-temurin:17-jre-alpine}
    container_name: medlab-java-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/medlab_db
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-medlab_user}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-medlab_password}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_WEB_RESOURCES_STATIC_LOCATIONS: file:/app/static/
      UPLOAD_DIR: /app/uploads
      SERVER_URL: http://localhost:8080
      OCR_ACCESS_URL: http://127.0.0.1:8080
      LANGCHAIN_SERVICE_URL: http://python-langchain:8000
      OCR_SERVICE_URL: http://172.18.0.1:18082
      PYTHON_OCR_RESPONSE_TIMEOUT_SECONDS: 240
      PYTHON_OCR_READ_TIMEOUT_SECONDS: 240
      JAVA_LOG_LEVEL: ${JAVA_LOG_LEVEL:-INFO}
      JAVA_OPTS: "-Xmx512m -Xms256m"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      python-langchain:
        condition: service_healthy
      python-ocr:
        condition: service_healthy
    networks:
      - medlab-network
    volumes:
      - ../backend-java/src/main/resources/static:/app/static:ro
      - ./uploads:/app/uploads
      - medlab_java_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/file/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  python-langchain:
    build:
      context: ../langchain_service
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-m.daocloud.io/docker.io/library/python:3.11-slim}
    container_name: medlab-langchain
    restart: unless-stopped
    environment:
      PYTHONPATH: /app
      LLM_API_KEY: ${LLM_API_KEY:-${DASHSCOPE_API_KEY}}
      LLM_BASE_URL: http://172.18.0.1:18081/v1
      LLM_MODEL: ${LLM_MODEL:-${DASHSCOPE_MODEL:-qwen-vl-plus-2025-05-07}}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-2000}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-vl-plus-2025-05-07}
      DATABASE_URL: postgresql://medlab_user:medlab_password@db:5432/medlab_db
      LANGCHAIN_TRACING_V2: "false"
      LANGSMITH_TRACING: "false"
      SERVICE_HOST: 0.0.0.0
      SERVICE_PORT: 8000
      DOCKER_ENV: "true"
      OCR_SERVICE_URL: http://172.18.0.1:18082
      GRAPH_SERVICE_URL: http://python-langchain:8000
      BACKEND_URL: http://java-backend:8080
      PYTHON_LOG_LEVEL: ${PYTHON_LOG_LEVEL:-INFO}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RAG_CACHE_TTL_SECONDS: ${RAG_CACHE_TTL_SECONDS:-86400}
      VECTOR_DB_PATH: /app/vector_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - medlab-network
    volumes:
      - ./uploads:/app/uploads
      - langchain_vector_db:/app/vector_db
      - langchain_medical_docs:/app/medical_docs
      - medlab_python_logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  python-ocr:
    build:
      context: ../ai-services-python/ocr_service
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-m.daocloud.io/docker.io/library/python:3.11-slim}
    container_name: medlab-ocr
    restart: unless-stopped
    environment:
      LLM_API_KEY: ${LLM_API_KEY:-${DASHSCOPE_API_KEY}}
      LLM_BASE_URL: http://172.18.0.1:18081/v1
      LLM_MODEL: ${LLM_MODEL:-${DASHSCOPE_MODEL:-qwen-vl-plus-2025-05-07}}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.5}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      VISION_MODEL: ${VISION_MODEL:-qwen-vl-plus-2025-05-07}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      UPLOAD_DIR: /app/uploads
      REDIS_HOST: redis
      REDIS_PORT: 6379
      HTTP_TIMEOUT: ${HTTP_TIMEOUT:-30}
      LLM_API_TIMEOUT: 240
      OCR_CACHE_TTL_SECONDS: ${OCR_CACHE_TTL_SECONDS:-3600}
      PYTHON_LOG_LEVEL: ${PYTHON_LOG_LEVEL:-INFO}
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - medlab-network
    volumes:
      - ./uploads:/app/uploads
      - medlab_ocr_logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/v1/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  python-ocr-egress:
    image: medlab-python-ocr:latest
    container_name: medlab-ocr-egress
    restart: unless-stopped
    network_mode: host
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "18082"]
    environment:
      LLM_API_KEY: ${LLM_API_KEY:-${DASHSCOPE_API_KEY}}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-${DASHSCOPE_MODEL:-qwen-vl-plus-2025-05-07}}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.5}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      VISION_MODEL: ${VISION_MODEL:-qwen-vl-plus-2025-05-07}
      UPLOAD_DIR: /app/uploads
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      HTTP_TIMEOUT: ${HTTP_TIMEOUT:-30}
      LLM_API_TIMEOUT: 240
      OCR_CACHE_TTL_SECONDS: ${OCR_CACHE_TTL_SECONDS:-3600}
      PYTHON_LOG_LEVEL: ${PYTHON_LOG_LEVEL:-INFO}
    volumes:
      - ./uploads:/app/uploads
      - medlab_ocr_logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:18082/api/v1/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  llm-egress-proxy:
    image: medlab-python-ocr:latest
    container_name: medlab-llm-egress
    restart: unless-stopped
    network_mode: host
    command: ["python", "/tools/llm_proxy.py", "--host", "0.0.0.0", "--port", "18081", "--env-file", "/app/.env"]
    environment:
      UPSTREAM_LLM_API_KEY: ${LLM_API_KEY:-${DASHSCOPE_API_KEY}}
      UPSTREAM_LLM_BASE_URL: ${LLM_BASE_URL:-}
    volumes:
      - ../tools:/tools:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:18081/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: medlab-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - medlab-network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # nginx 已禁用，直接使用后端服务
  # nginx:
  #   image: docker.m.daocloud.io/library/nginx:latest-alpine
  #   container_name: medlab-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ../frontend-vue/dist:/usr/share/nginx/html:ro
  #     - medlab_nginx_cache:/var/cache/nginx
  #   depends_on:
  #     - java-backend
  #     - python-langchain
  #     - python-ocr
  #   networks:
  #     - medlab-network

volumes:
  postgres_data:
    external: true
    name: medlab_postgres_data
  redis_data:
  langchain_vector_db:
  langchain_medical_docs:
  medlab_java_logs:
  medlab_python_logs:
  medlab_ocr_logs:
  medlab_nginx_cache:

networks:
  medlab-network:
    driver: bridge
