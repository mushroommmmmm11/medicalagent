# ========================================
# MedLabAgent System - Application Configuration
# ========================================

spring:
  profiles:
    active: prod

  application:
    name: medlab-agent-system

  # Database Configuration - PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/medlab_db
    username: medlab_user
    password: medlab_password
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 3000
      maximum-pool-size: 5

  # JPA/Hibernate Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Web Configuration
  web:
    cors:
      allowed-origins: "*"
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      max-age: 3600

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-super-secret-key-change-this-in-production-environment-variable}
  expiration: ${JWT_EXPIRATION:86400000}

# AI Services Configuration
ai:
  bailian:
    api-key: sk-7abf8a7f73354b7583e99596c5170d83
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    model: qwen3.5-122b-a10b
    temperature: 0.7
    top-p: 0.95
    max-tokens: 2000

# MinIO Configuration (Object Storage)
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:medlab-reports}

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /

# Logging Configuration
logging:
  level:
    root: INFO
    com.medlab: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/medlab-agent.log
